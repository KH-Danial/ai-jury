name: 🕵️ Market Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # این خط برای push کردن ضروری است
    timeout-minutes: 10

    steps:
      - name: 📥 دریافت کدها
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 نصب نیازمندی‌ها
        run: pip install requests

      - name: 🔍 اجرای تحلیل
        id: analysis
        run: python fetch_and_analyze.py

      - name: 💾 ذخیره تغییرات
        if: always()  # حتی اگر اسکریپت خطا بدهد، تلاش می‌کند فایل‌ها را push کند
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add README.md market_report.json price_history.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "📝 هیچ تغییری برای commit وجود ندارد"
          else
            git commit -m "به‌روزرسانی خودکار گزارش - $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ تغییرات با موفقیت push شد"
          fi